<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0d1117; --bg-card: #161b22; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
      --gold: #f0b036; --gold-dark: #c4912a; --orange: #ff7b3a;
      --blue: #58a6ff; --red: #f85149; --green: #3fb950;
      --purple: #a371f7; --pink: #db61a2; --cyan: #39c5cf;
    }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; line-height: 1.6; }
    body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px); pointer-events: none; z-index: 9999; }
    .container { max-width: 540px; margin: 0 auto; padding: 16px; min-height: 100vh; }
    .page { display: none; } .page.active { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .ark-btn { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--bg-dark); border: none; padding: 14px 32px; font-size: 15px; font-weight: 600; cursor: pointer; clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px); width: 100%; letter-spacing: 2px; transition: all 0.2s; }
    .ark-btn:active { transform: scale(0.97); } .ark-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ark-btn-secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); }
    .ark-btn-small { padding: 10px 20px; font-size: 13px; }
    .music-btn { position: fixed; top: 16px; right: 16px; width: 44px; height: 44px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-size: 18px; }
    .music-btn.playing { border-color: var(--gold); box-shadow: 0 0 12px rgba(240,176,54,0.3); }
    .intro { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; position: relative; }
    .intro-logo { width: 100px; height: 100px; position: relative; margin-bottom: 32px; }
    .intro-logo::before { content: ''; position: absolute; inset: 0; border: 2px solid var(--gold); transform: rotate(45deg); animation: pulse 2s ease-in-out infinite; }
    .intro-logo::after { content: '◈'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--gold); }
    .intro h1 { font-family: 'Noto Serif SC', serif; font-size: 28px; margin-bottom: 8px; letter-spacing: 6px; }
    .intro-sub { color: var(--text2); font-size: 12px; letter-spacing: 4px; margin-bottom: 40px; }
    .intro p { color: var(--text2); font-size: 14px; line-height: 2; margin-bottom: 40px; max-width: 300px; }
    .intro-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    .intro-footer { position: absolute; bottom: 24px; font-size: 10px; color: var(--text3); letter-spacing: 2px; }
    .stats-page-header { text-align: center; margin-bottom: 20px; padding: 20px; background: linear-gradient(180deg, rgba(240,176,54,0.05), transparent); border-bottom: 1px solid var(--border); }
    .stats-page-header h2 { font-family: 'Noto Serif SC', serif; font-size: 18px; margin-bottom: 8px; letter-spacing: 3px; }
    .stats-page-header p { color: var(--text2); font-size: 12px; }
    .points-left { text-align: center; font-size: 16px; margin-bottom: 20px; color: var(--gold); }
    .stat-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .stat-row-name { width: 70px; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .stat-row-bar { flex: 1; display: flex; gap: 4px; margin: 0 12px; }
    .stat-dot { width: 20px; height: 20px; background: var(--border); clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%); transition: all 0.15s; }
    .stat-dot.filled { background: var(--gold); }
    .stat-row-btns { display: flex; gap: 8px; }
    .stat-btn { width: 32px; height: 32px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%); }
    .stat-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .stat-btn:hover:not(:disabled) { border-color: var(--gold); }
    .stats-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
    .talent-header { text-align: center; margin-bottom: 20px; padding: 20px; background: linear-gradient(180deg, rgba(240,176,54,0.05), transparent); border-bottom: 1px solid var(--border); }
    .talent-header h2 { font-family: 'Noto Serif SC', serif; font-size: 18px; margin-bottom: 8px; letter-spacing: 3px; }
    .talent-header p { color: var(--text2); font-size: 12px; }
    .talent-count { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; font-size: 13px; }
    .talent-count-bar { display: flex; gap: 6px; }
    .talent-count-dot { width: 12px; height: 12px; background: var(--border); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
    .talent-count-dot.filled { background: var(--gold); box-shadow: 0 0 8px rgba(240,176,54,0.5); }
    .talent-pool { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; max-height: 55vh; overflow-y: auto; }
    .talent-card { background: var(--bg-card); border: 1px solid var(--border); padding: 12px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; position: relative; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); transition: all 0.2s; }
    .talent-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border); }
    .talent-card:hover { border-color: var(--gold); } .talent-card:hover::before { background: var(--gold); }
    .talent-card.selected { border-color: var(--gold); background: rgba(240,176,54,0.08); } .talent-card.selected::before { background: var(--gold); }
    .talent-card.disabled { opacity: 0.35; cursor: not-allowed; }
    .talent-icon { width: 36px; height: 36px; background: var(--bg-dark); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .talent-info { flex: 1; min-width: 0; }
    .talent-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .talent-rarity { font-size: 9px; padding: 2px 6px; letter-spacing: 1px; }
    .talent-rarity.legend { background: linear-gradient(90deg, var(--gold), var(--orange)); color: var(--bg-dark); }
    .talent-rarity.rare { background: var(--purple); color: white; }
    .talent-rarity.bad { background: var(--red); color: white; }
    .talent-desc { font-size: 11px; color: var(--text2); line-height: 1.5; }
    .talent-effect { font-size: 10px; margin-top: 4px; color: var(--green); font-family: monospace; }
    .talent-effect.negative { color: var(--red); }
    .talent-actions { display: flex; gap: 10px; } .talent-actions .ark-btn { flex: 1; }
    .game-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--border); margin-bottom: 10px; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%); }
    .age-display { display: flex; align-items: baseline; gap: 4px; }
    .age-num { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 600; color: var(--gold); }
    .age-label { font-size: 14px; color: var(--text2); }
    .status-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-tag { padding: 3px 8px; font-size: 10px; letter-spacing: 1px; }
    .status-tag.infected { background: var(--orange); color: var(--bg-dark); }
    .status-tag.rhodes { background: var(--blue); color: white; }
    .status-tag.special { background: var(--purple); color: white; }
    .status-tag.danger { background: var(--red); color: white; }
    .status-tag.cyan { background: var(--cyan); color: var(--bg-dark); }
    .status-tag.green { background: var(--green); color: var(--bg-dark); }
    .stats-bar { display: flex; gap: 6px; margin-bottom: 10px; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); }
    .stat-item { flex: 1; text-align: center; }
    .stat-icon { font-size: 12px; } .stat-value { font-size: 16px; font-weight: 600; font-family: monospace; }
    .stat-value.low { color: var(--red); } .stat-value.high { color: var(--green); }
    .stat-name { font-size: 9px; color: var(--text3); }
    .event-log { background: var(--bg-card); border: 1px solid var(--border); height: calc(100vh - 320px); min-height: 280px; overflow-y: auto; margin-bottom: 10px; position: relative; }
    .event-log::before { content: 'TERMINAL LOG'; position: absolute; top: 8px; right: 10px; font-size: 9px; color: var(--text3); letter-spacing: 2px; z-index: 1; }
    .event-log-inner { padding: 28px 14px 14px; }
    .event-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; animation: fadeIn 0.3s; }
    .event-item:last-child { border-bottom: none; }
    .event-age { font-size: 11px; color: var(--gold); font-family: monospace; width: 32px; flex-shrink: 0; }
    .event-text { font-size: 13px; line-height: 1.7; flex: 1; }
    .event-text.good { color: var(--green); } .event-text.bad { color: var(--red); }
    .event-text.special { color: var(--purple); } .event-text.legendary { color: var(--gold); }
    .event-text.pink { color: var(--pink); } .event-text.cyan { color: var(--cyan); }
    .ending-page { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 24px 0; }

    .ending-icon { font-size: 44px; margin-bottom: 12px; }
    .ending-title { font-family: 'Noto Serif SC', serif; font-size: 22px; margin-bottom: 6px; letter-spacing: 3px; }
    .ending-subtitle { color: var(--text2); font-size: 13px; }
    .ending-stats { display: flex; gap: 1px; background: var(--border); margin-bottom: 14px; }
    .ending-stat { flex: 1; text-align: center; padding: 14px; background: var(--bg-card); }
    .ending-stat-value { font-size: 24px; font-weight: 600; color: var(--gold); font-family: monospace; }
    .ending-stat-label { font-size: 9px; color: var(--text3); margin-top: 4px; letter-spacing: 2px; }
    .ending-achievements { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .achievement { padding: 5px 12px; background: var(--bg-card); border: 1px solid var(--gold); font-size: 10px; color: var(--gold); }
    .achievement.rare { border-color: var(--purple); color: var(--purple); }
    .ending-card { background: var(--bg-card); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
    .ending-section { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .ending-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .ending-label { font-size: 9px; color: var(--text3); margin-bottom: 5px; letter-spacing: 2px; }
    .ending-value { font-size: 13px; line-height: 1.8; }
    .ending-summary { padding: 16px; background: linear-gradient(135deg, rgba(240,176,54,0.05), transparent); border: 1px solid rgba(240,176,54,0.2); font-size: 13px; line-height: 1.9; margin-bottom: 16px; white-space: pre-wrap; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg-dark); } ::-webkit-scrollbar-thumb { background: var(--border); }

<script>
// ===== 音乐控制 =====
let musicPlaying = false;
const bgm = document.getElementById('bgm');
function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (musicPlaying) { 
    bgm.pause(); 
    btn.textContent = '🔇'; 
    btn.classList.remove('playing'); 
    musicPlaying = false; 
  } else {
    btn.textContent = '⏳';
    bgm.volume = 0.5;
    bgm.load(); // 强制重新加载
    
    // 超时检测
    const timeout = setTimeout(() => {
      if (!musicPlaying) {
        btn.textContent = '🔇';
        alert('音频加载超时，请检查网络或刷新页面重试');
      }
    }, 8000);
    
    bgm.oncanplaythrough = function() {
      bgm.play().then(() => { 
        clearTimeout(timeout);
        btn.textContent = '🔊'; 
        btn.classList.add('playing'); 
        musicPlaying = true; 
      }).catch(() => {
        clearTimeout(timeout);
        btn.textContent = '🔇';
        alert('请先点击页面任意位置，再点击播放按钮');
      });
    };
  }
}

// ===== 状态 =====
let state = {};

// ===== 工具函数 =====
const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const pick = arr => arr[rand(0, arr.length - 1)];
const pickN = (arr, n) => [...arr].sort(() => Math.random() - 0.5).slice(0, n);
const chance = p => Math.random() * 100 < p;
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const showPage = id => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
const addStat = (id, v) => { state.stats[id] = clamp(state.stats[id] + v, 0, 10); };
const getLoc = () => LOCATIONS[state.nation.id] ? pick(LOCATIONS[state.nation.id]) : state.nation.name;

// ===== 游戏流程 =====
function startGame() {
  state = { baseStats: { looks: 0, health: 0, intel: 0, luck: 0, wealth: 0 }, stats: { looks: 0, health: 0, intel: 0, luck: 0, wealth: 0 }, points: 20, age: 0, nation: null, race: null, talents: [], selectedTalents: [], talentPool: [], infected: false, dead: false, deathCause: '', events: [], flags: {}, achievements: [], location: '' };
  initStatsPage(); showPage('stats-page');
}

function initStatsPage() { state.baseStats = { looks: 0, health: 0, intel: 0, luck: 0, wealth: 0 }; state.points = 20; renderStatsPage(); }

function renderStatsPage() {
  document.getElementById('stats-container').innerHTML = STATS_DEF.map(s => `<div class="stat-row"><div class="stat-row-name">${s.icon} ${s.name}</div><div class="stat-row-bar">${Array(10).fill(0).map((_, i) => `<div class="stat-dot ${i < state.baseStats[s.id] ? 'filled' : ''}"></div>`).join('')}</div><div class="stat-row-btns"><button class="stat-btn" onclick="changeStat('${s.id}', -1)" ${state.baseStats[s.id] <= 0 ? 'disabled' : ''}>-</button><button class="stat-btn" onclick="changeStat('${s.id}', 1)" ${state.baseStats[s.id] >= 10 || state.points <= 0 ? 'disabled' : ''}>+</button></div></div>`).join('');
  document.getElementById('points-left').textContent = state.points;
  document.getElementById('next-to-talent-btn').disabled = state.points > 0;
}

function changeStat(id, delta) { const nv = state.baseStats[id] + delta; if (nv < 0 || nv > 10) return; if (delta > 0 && state.points <= 0) return; state.baseStats[id] = nv; state.points -= delta; renderStatsPage(); }

function randomStats() { STATS_DEF.forEach(s => state.baseStats[s.id] = 0); state.points = 20; while (state.points > 0) { const s = pick(STATS_DEF); if (state.baseStats[s.id] < 10) { state.baseStats[s.id]++; state.points--; } } renderStatsPage(); }

function goToTalentPage() { state.selectedTalents = []; refreshTalents(); showPage('talent-page'); }

function refreshTalents() {
  const legends = TALENTS.filter(t => t.rarity === 'legend'), rares = TALENTS.filter(t => t.rarity === 'rare'), normals = TALENTS.filter(t => !t.rarity), bads = TALENTS.filter(t => t.rarity === 'bad');
  let pool = []; if (chance(10)) pool.push(pick(legends)); pool.push(...pickN(rares, rand(2, 4))); pool.push(...pickN(bads, rand(2, 3))); while (pool.length < 12) { const t = pick(normals); if (!pool.find(p => p.id === t.id)) pool.push(t); }
  state.talentPool = pool.sort(() => Math.random() - 0.5); state.selectedTalents = []; renderTalentPool();
}

function renderTalentPool() {
  document.getElementById('talent-pool').innerHTML = state.talentPool.map(t => {
    const sel = state.selectedTalents.includes(t.id), dis = !sel && state.selectedTalents.length >= 3;
    let rc = '', rt = '普通'; if (t.rarity === 'legend') { rc = 'legend'; rt = '传说'; } else if (t.rarity === 'rare') { rc = 'rare'; rt = '稀有'; } else if (t.rarity === 'bad') { rc = 'bad'; rt = '负面'; }
    let ef = t.effect ? Object.entries(t.effect).map(([k, v]) => { const s = STATS_DEF.find(x => x.id === k); return `${s.name}${v > 0 ? '+' : ''}${v}`; }).join(' ') : '';
    return `<div class="talent-card ${sel ? 'selected' : ''} ${dis ? 'disabled' : ''}" onclick="toggleTalent('${t.id}')"><div class="talent-icon">${t.icon}</div><div class="talent-info"><div class="talent-name">${t.name}<span class="talent-rarity ${rc}">${rt}</span></div><div class="talent-desc">${t.desc}</div>${ef ? `<div class="talent-effect ${t.rarity === 'bad' ? 'negative' : ''}">${ef}</div>` : ''}</div></div>`;
  }).join('');
  for (let i = 0; i < 3; i++) document.getElementById(`dot-${i}`).classList.toggle('filled', i < state.selectedTalents.length);
  document.getElementById('confirm-btn').disabled = state.selectedTalents.length !== 3;
}

function toggleTalent(id) { const i = state.selectedTalents.indexOf(id); if (i >= 0) state.selectedTalents.splice(i, 1); else if (state.selectedTalents.length < 3) state.selectedTalents.push(id); renderTalentPool(); }

function confirmTalents() { state.talents = state.selectedTalents.map(id => TALENTS.find(t => t.id === id)); startLife(); }

function quickStart() {
  state = { baseStats: { looks: 0, health: 0, intel: 0, luck: 0, wealth: 0 }, stats: { looks: 0, health: 0, intel: 0, luck: 0, wealth: 0 }, points: 20, age: 0, nation: null, race: null, talents: [], selectedTalents: [], talentPool: [], infected: false, dead: false, deathCause: '', events: [], flags: {}, achievements: [], location: '' };
  randomStats(); refreshTalents(); state.selectedTalents = state.talentPool.slice(0, 3).map(t => t.id); state.talents = state.selectedTalents.map(id => TALENTS.find(t => t.id === id)); startLife();
}

// ===== 开始人生 =====
function startLife() {
  state.stats = { ...state.baseStats }; state.age = 0; state.infected = false; state.dead = false; state.deathCause = ''; state.events = []; state.flags = {}; state.achievements = [];
  state.nation = pick(NATIONS);
  const availableRaces = RACES.filter(r => state.nation.races.includes(r.id));
  state.race = availableRaces.length > 0 ? pick(availableRaces) : pick(RACES);
  state.location = getLoc();
  
  // 应用加成
  if (state.race.bonus) Object.entries(state.race.bonus).forEach(([k, v]) => addStat(k, v));
  addStat('wealth', state.nation.baseWealth);
  state.talents.forEach(t => {
    if (t.effect) Object.entries(t.effect).forEach(([k, v]) => addStat(k, v));
    if (t.special === 'infected_birth') { state.infected = true; state.flags.infected_birth = true; }
    if (t.special) state.flags[`talent_${t.special}`] = true;
  });
  
  // 种族特殊
  if (state.race.special === 'sarkaz' && chance(30)) state.infected = true;
  if (state.race.special === 'sankta') state.flags.is_sankta = true;
  if (state.race.special === 'lung') state.flags.is_lung = true;
  if (state.race.special === 'oni') state.flags.is_oni = true;
  if (state.race.special === 'aegir') state.flags.is_aegir = true;
  if (state.race.special === 'durin') state.flags.is_durin = true;
  if (state.race.special === 'lupo') state.flags.is_lupo = true;
  if (state.race.special === 'kuranta') state.flags.is_kuranta = true;
  if (state.race.special === 'manticore') state.flags.is_manticore = true;
  if (state.race.special === 'draco') state.flags.is_draco = true;
  if (state.race.special === 'aslan') state.flags.is_aslan = true;
  
  // 出生事件
  addEvent(`你出生在${state.nation.name}的${state.location}，是一个${state.race.name}。`);
  addEvent(`${state.nation.desc}。`);
  
  // 国家特色初始描述
  nationBirthEvents();
  
  if (state.stats.wealth >= 8) addEvent('你的家族非常富有，住在豪宅里。', 'good');
  else if (state.stats.wealth >= 6) addEvent('你的家庭条件不错，生活无忧。', 'good');
  else if (state.stats.wealth <= 2) addEvent('你的家庭一贫如洗，住在贫民窟。', 'bad');
  else if (state.stats.wealth <= 4) addEvent('你的家庭条件一般，勉强温饱。');
  
  state.talents.forEach(t => {
    const c = t.rarity === 'bad' ? 'bad' : (t.rarity === 'legend' ? 'legendary' : (t.rarity === 'rare' ? 'special' : 'good'));
    addEvent(`【${t.name}】${t.desc}`, c);
  });
  
  if (state.infected) {
    addEvent('你出生时就携带了矿石病...体内有源石结晶。', 'bad');
    nationInfectedReaction();
  }
  
  // 种族特殊描述
  raceSpecialBirth();
  
  showPage('game-page'); renderGame();
}

// ===== 年度事件系统 =====
function nextYear() {
  if (state.dead) { showEnding(); return; }
  state.age++;
  
  // 根据年龄段和随机数决定事件
  if (state.age <= 3) babyEvents();
  else if (state.age <= 12) childEvents();
  else if (state.age <= 18) teenEvents();
  else if (state.age <= 35) youngAdultEvents();
  else if (state.age <= 55) middleAgeEvents();
  else elderEvents();
  
  // 检查各种条件
  if (!state.dead) {
    checkDisaster();
    checkInfection();
    checkSpecialEvents();
    checkCharacterEncounters();
    checkDeath();
  }
  renderGame();
}

    if (state.stats.luck <= 4 && chance(40)) {
      addEvent('你加入了整合运动。', 'special');
      state.flags.reunion = true; addAchievement('整合运动成员', true);
    } else addEvent('你拒绝了。暴力不是答案。');
    return;
  }
  
  // 莱茵生命
  if (state.flags.talent_rhine && n === 'columbia' && chance(25)) {
    addEvent('你在莱茵生命找到了工作！', 'good');
    state.flags.rhine_employee = true; addStat('wealth', 2); addStat('intel', 1);
    if (chance(30)) addEvent('你见到了沉默医生。', 'special');
    return;
  }
  
  // 事业发展
  if (state.stats.intel >= 7 && state.stats.wealth >= 5 && chance(15)) {
    addEvent('凭借才智，你的事业蒸蒸日上。', 'good');
    addStat('wealth', 2);
    return;
  }
  
  // 结婚
  if (state.age >= 25 && !state.flags.married && state.stats.looks >= 5 && chance(12)) {
    addEvent('你遇到了人生伴侣，步入婚姻。', 'good');
    state.flags.married = true; addAchievement('成家立业');
    if (chance(40) && state.age <= 32) {
      addEvent('你们有了孩子。', 'good');
      state.flags.has_child = true;
    }
    return;
  }
  
  addEvent(pick([
    '你努力工作。', '平凡的一年。', '日子就这样过去了。',
    '你的生活逐渐稳定下来。', `你在${state.location}度过了忙碌的一年。`
  ]));
}

function rhodesEvents() {
  const evts = [
    { w: 15, t: '你执行了一次常规任务，顺利完成。' },
    { w: 12, t: '你和其他干员进行了训练。' },
    { w: 8, t: '你在食堂吃到了古米的炖菜。', e: { health: 1 } },
    { w: 6, t: '博士给你发了奖金。', type: 'good', e: { wealth: 1 } },
    { w: 5, t: '你遇到了阿米娅。', type: 'good' },
    { w: 4, t: '你看到德克萨斯和拉普兰德在吵架...', type: 'special' },
    { w: 4, t: '能天使给了你一个苹果派。', type: 'special' },
    { w: 4, t: '你在训练场看到陈在练剑。', type: 'special' },
    { w: 3, t: '红送给你一个兔子布偶。', type: 'special' },
    { w: 3, t: '闪灵为你治疗了伤口。', type: 'good', e: { health: 1 } },
    { w: 3, t: '你看到了史尔特尔。', type: 'special' },
    { w: 3, t: '棘刺在甲板上钓鱼，邀请你一起。', type: 'good' },
    { w: 2, t: '你见到了浊心斯卡蒂，她体内的"她"让你脊背发凉。', type: 'cyan' },
    { w: 2, t: '艾雅法拉给你讲解了火山学知识。', type: 'good', e: { intel: 1 } },
    { w: 2, t: '你和银灰下了一盘棋。', type: 'special' },
    { w: 2, t: '崖心拉着你去攀岩。', type: 'good' },
    { w: 2, t: '格拉尼给你分享了骑士小饼干。', type: 'good' },
    { w: 1, t: '你看到了凯尔希身边的Mon3tr。', type: 'special' },
    { w: 1, t: '你感觉有人在看你...是曼提柯？', type: 'special' },
  ];
  
  if (state.infected) evts.push({ w: 10, t: '你接受了罗德岛的治疗，矿石病得到控制。', type: 'good', e: { health: 1 } });
  if (state.flags.is_sankta) evts.push({ w: 5, t: '你遇到了能天使，她很高兴见到同族！', type: 'good' });
  if (state.race.id === 'sarkaz') evts.push({ w: 5, t: 'W用奇怪的眼神看着你。', type: 'special' });
  
  if (state.flags.met_doctor && !state.flags.priestess_vision && chance(8)) {
    addEvent('你又做了那个梦。一个白色的身影，一个温柔的声音...', 'legendary');
    state.flags.priestess_vision = true;
    addAchievement('普瑞赛斯的幻影', true);
    return;
  }
  
  if (chance(5)) {
    addEvent(pick(['你参与了龙门保卫战！', '你参与了切尔诺伯格行动！', '你参与了打击整合运动残党的行动。']), 'special');
    if (chance(30)) { addEvent('你在行动中负伤。', 'bad'); addStat('health', -1); }
    return;
  }
  
  const valid = evts;
  const total = valid.reduce((s, e) => s + e.w, 0);
  let r = Math.random() * total;
  for (const e of valid) {
    r -= e.w;
    if (r <= 0) {
      addEvent(e.t, e.type || '');
      if (e.e) Object.entries(e.e).forEach(([k, v]) => addStat(k, v));
      break;
    }
  }
}

function middleAgeEvents() {
  if (state.infected && !state.flags.rhodes) {
    addEvent('矿石病进入中期，身体明显恶化。', 'bad');
    addStat('health', -1);
    if (state.stats.health <= 2 && chance(40)) { state.dead = true; state.deathCause = '矿石病恶化'; }
    return;
  }
  
  if (state.flags.rhodes) { rhodesEvents(); return; }
  
  if (state.flags.has_child && chance(20)) { addEvent('你的孩子长大成人了。', 'good'); return; }
  
  if (state.stats.health <= 4 && chance(25)) { addEvent('你开始感受到身体的衰老。', 'bad'); addStat('health', -1); return; }
  
  addEvent(pick([
    '人到中年，你回顾人生。', '平静的一年。', '岁月不饶人。',
    '你开始怀念年轻时的日子。', `你在${state.location}安稳度日。`
  ]));
}

function elderEvents() {
  if (state.infected && chance(30 + (state.flags.rhodes ? -15 : 0))) {
    state.dead = true;
    state.deathCause = '矿石病晚期';
    addEvent('矿石病进入末期...', 'bad');
    return;
  }
  
  const dc = (state.age - 55) * 4 + (10 - state.stats.health) * 5;
  if (chance(dc)) {
    state.dead = true;
    state.deathCause = state.age >= 80 ? '寿终正寝' : pick(['在睡梦中离世', '器官衰竭', '因病去世']);
    if (state.age >= 80) addAchievement('长寿', true);
    if (state.age >= 100) addAchievement('百岁老人', true);
    addEvent('你感到生命正在流逝...', 'bad');
    return;
  }
  
  if (state.flags.talent_immortal && state.age >= 90) addEvent('你的身体依然健康得不可思议。', 'special');
  
  if (state.flags.rhodes) { rhodesEvents(); return; }
  
  addEvent(pick([
    '你安享晚年。', '你给年轻人讲述过去的故事。', '身体大不如前了。',
    '你回忆起这一生的种种。', `你在${state.location}度过平静的日子。`
  ]));
  
  if (chance(25)) addStat('health', -1);
}

// 检查事件函数
function checkDisaster() {
  if (!chance(state.nation.danger * 1.5)) return;
  
  addEvent(pick(['天灾袭击了你所在的地区！', '源石风暴席卷而来！']), 'bad');
  
  if (state.flags.talent_calamity) { addEvent('但你早已预感到天灾来临，提前做好了准备。', 'good'); return; }
  
  if (state.stats.luck <= 3 && chance(30)) {
    addEvent('你在天灾中受了重伤。', 'bad');
    addStat('health', -2);
    if (!state.infected && chance(30)) { state.infected = true; addEvent('更糟的是，你感染了矿石病...', 'bad'); }
    if (state.stats.health <= 0) { state.dead = true; state.deathCause = '在天灾中丧生'; }
  } else if (chance(15)) { addEvent('你在天灾中失去了财产。', 'bad'); addStat('wealth', -2); }
}

function checkInfection() {
  if (state.infected) return;
  let base = state.flags.talent_resist ? 0.3 : 1;
  base += state.nation.danger * 0.2;
  if (state.race.special === 'sarkaz') base += 1.5;
  
  if (chance(base)) {
    state.infected = true;
    addEvent('你被诊断出感染了矿石病...', 'bad');
    nationInfectedReaction();
    if (!state.flags.rhodes && chance(25)) { addEvent('你听说有个叫罗德岛的组织在帮助感染者...', 'special'); state.flags.rhodes_contact = true; }
  }
}

function checkSpecialEvents() {
  if (state.flags.pet_slug && chance(4)) { addEvent('你的源石虫生了一窝小虫子！', 'special'); state.flags.slug_family = true; addAchievement('源石虫大家族'); }
  
  if (state.flags.is_sankta && state.flags.has_gun && !state.flags.fallen && chance(1.5)) {
    addEvent('在某次冲突中，你对另一位萨科塔举起了守护铳...', 'bad');
    addEvent('律法降下了惩罚，你成为了堕天使...', 'bad');
    state.flags.fallen = true; addAchievement('堕天使', true);
  }
}

function checkCharacterEncounters() {
  if (state.flags.rhodes || chance(95)) return;
  const n = state.nation.id;
  
  if (n === 'lungmen' && chance(20)) addEvent(pick(['你在街头看到了陈小姐。', '你遇到了星熊。', '你看到了魏彦吾大人的车队。']), 'special');
  if (n === 'kazimierz' && chance(20)) addEvent(pick(['你看到了耀骑士临光的比赛！', '你看到了白金小姐。']), 'special');
  if (n === 'kjerag' && chance(20)) addEvent(pick(['你看到了银灰大人。', '你遇到了崖心小姐。']), 'special');
}

function checkDeath() {
  if (state.dead) return;
  
  if (state.stats.health <= 0) { state.dead = true; state.deathCause = state.infected ? '矿石病' : '身体衰竭'; addEvent('身体到达极限...', 'bad'); return; }
  if (state.stats.luck <= 0 && chance(20)) { state.dead = true; state.deathCause = pick(['流弹击中', '意外事故', '倒霉到家']); addEvent('命运开了残酷的玩笑...', 'bad'); }
}

// 结局
function showEnding() {
  let score = state.age;
  if (state.flags.rhodes) score += 25;
  if (state.flags.married) score += 10;
  if (state.flags.has_child) score += 10;
  if (state.flags.knight) score += 15;
  if (state.flags.penguin) score += 10;
  if (state.flags.rhine_employee) score += 15;
  if (state.flags.blacksteel_member) score += 12;
  if (state.stats.wealth >= 7) score += 15;
  if (state.age >= 70) score += 20;
  if (state.age >= 80) score += 20;
  state.achievements.forEach(a => score += a.rare ? 15 : 5);
  
  let icon = '💀', title = '人生终结';
  if (state.age >= 100) { icon = '🌟'; title = '传奇人生'; }
  else if (state.age >= 80) { icon = '🌅'; title = '寿终正寝'; }
  else if (state.flags.rhodes && state.age >= 50) { icon = '⚔️'; title = '传奇干员'; }
  else if (state.flags.reunion) { icon = '🔥'; title = '燃烧的灵魂'; }
  else if (state.flags.priestess_vision) { icon = '✨'; title = '来自远古的记忆'; }
  else if (state.flags.knight && state.age >= 40) { icon = '🏇'; title = '荣耀骑士'; }
  else if (state.flags.fallen) { icon = '😈'; title = '堕落的天使'; }
  else if (state.infected && state.age < 30) { icon = '💎'; title = '被矿石病夺走的青春'; }
  else if (state.age < 18) { icon = '🥀'; title = '过早凋零'; }
  
  document.getElementById('ending-icon').textContent = icon;
  document.getElementById('ending-title').textContent = title;
  document.getElementById('ending-subtitle').textContent = `享年${state.age}岁`;
  
  document.getElementById('ending-stats').innerHTML = `
    <div class="ending-stat"><div class="ending-stat-value">${state.age}</div><div class="ending-stat-label">享年</div></div>
    <div class="ending-stat"><div class="ending-stat-value">${score}</div><div class="ending-stat-label">评分</div></div>
    <div class="ending-stat"><div class="ending-stat-value">${state.achievements.length}</div><div class="ending-stat-label">成就</div></div>
  `;
  
  document.getElementById('ending-achievements').innerHTML = state.achievements.map(a => `<span class="achievement ${a.rare ? 'rare' : ''}">${a.name}</span>`).join('');
  
  document.getElementById('ending-origin').textContent = `${state.nation.name}${state.location}的${state.race.name}`;
  document.getElementById('ending-death').textContent = state.deathCause;
  
  let ep = '平凡的一生，但认真活过。';
  if (state.age < 10) ep = '还没来得及看清这个世界...';
  else if (state.age < 18) ep = '青春的花朵过早凋零。';
  else if (state.flags.priestess_vision) ep = '她听到了来自远古的呼唤...';
  else if (state.flags.rhodes) ep = '为感染者的未来而战斗过的人。';
  else if (state.infected) ep = '愿来世不再有矿石病。';
  else if (state.flags.reunion) ep = '为尊严燃烧到最后一刻。';
  else if (state.flags.knight) ep = '竞技场上的荣耀永不褪色。';
  else if (state.age >= 100) ep = '活过了一个世纪，传奇。';
  else if (state.age >= 80) ep = '在泰拉活了一辈子，何其幸运。';
  document.getElementById('ending-epitaph').textContent = ep;
  
  let sum = `你作为${state.race.name}出生在${state.nation.name}的${state.location}。\n`;
  if (state.talents.length > 0) sum += `天赋是"${state.talents.map(t => t.name).join('"、"')}"。\n`;
  if (state.infected) sum += '你是一名感染者。';
  if (state.flags.rhodes) sum += '你曾是罗德岛的干员。';
  if (state.flags.knight) sum += '你当过竞技骑士。';
  if (state.flags.penguin) sum += '你在企鹅物流打过工。';
  if (state.flags.rhine_employee) sum += '你在莱茵生命工作过。';
  if (state.flags.blacksteel_member) sum += '你是黑钢国际的成员。';
  if (state.flags.tianshifu_member) sum += '你是天师府的弟子。';
  if (state.flags.reunion) sum += '你曾是整合运动的一员。';
  if (state.flags.fallen) sum += '你成为了堕天使。';
  if (state.flags.married) sum += '你拥有过家庭。';
  sum += `\n最终在${state.age}岁时，${state.deathCause}。`;
  
  if (score >= 150) sum += '\n\n这是泰拉大陆上的传奇人生！';
  else if (score >= 100) sum += '\n\n这是精彩的人生。';
  else if (score >= 60) sum += '\n\n平凡但真实的一生。';
  else sum += '\n\n泰拉是残酷的，但你至少来过这个世界。';
  
  document.getElementById('ending-summary').textContent = sum;
  showPage('ending-page');
}

function restart() { showPage('intro-page'); }
</script>
</body>
</html>
